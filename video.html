<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vídeo</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg, #333ce0, #46dee9);
}

video{
width:1200px;
border-radius:15px;
}

</style>

</head>

<body>

<video id="player" controls>
<source id="videoSource" src="" type="video/mp4">
</video>

<script>

const params = new URLSearchParams(window.location.search)
const video = params.get("video")

const source = document.getElementById("videoSource")

if(video === "chapeuzinho"){
source.src = "videos/video.mp4"
}

if(video === "porquinhos"){
source.src = "videos/porquinho.mp4"
}

if(video === "branca"){
source.src = "videos/branca.mp4"
}

document.getElementById("player").load()

</script>

</body>
</html>
